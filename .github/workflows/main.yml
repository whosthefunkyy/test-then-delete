name: Ci pipe

on:
  push:
    branches: [main]



jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run test
        run: go test -v ./...
  
  docker:
      needs: build
      runs-on: ubuntu-latest

      steps:
        - name: Copy repo
          uses: actions/checkout@v4

        - name: LOGIN into docker hub!
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build and push
          uses: docker/build-push-action@v5
          with: 
            context: .
            push: true
            tags: whosthefunky/cicd-practice:${{ github.sha }}
  
  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull whosthefunky/cicd-practice:${{ github.sha }}
            docker stop app || true
            docker rm app || true
            docker run -d \
              --name app \
              -p 80:8080 \
              whosthefunky/cicd-practice:${{ github.sha }}